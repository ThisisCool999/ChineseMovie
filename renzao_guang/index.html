<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>《人造光》— 短片</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="stylesheet" href="film.css" />
</head>
<body>

<!-- ===================== INTRO SEQUENCE ===================== -->
<div id="intro" class="intro"></div>

<!-- ===================== POSTER / START GATE ===================== -->
<div id="poster" class="poster">
  <canvas id="posterFx" class="poster-fx"></canvas>
  <svg class="svg-defs" width="0" height="0" aria-hidden="true"><defs>
    <filter id="rough" x="-25%" y="-25%" width="150%" height="150%"><feTurbulence type="fractalNoise" baseFrequency="0.013 0.017" numOctaves="2" seed="7" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="7"/></filter>
    <filter id="roughFine" x="-25%" y="-25%" width="150%" height="150%"><feTurbulence type="fractalNoise" baseFrequency="0.03 0.06" numOctaves="3" seed="11" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="3"/></filter>
  </defs></svg>
  <div class="poster-grain"></div>
  <div class="poster-inner">
    <div class="poster-kicker">David · Joey · Brandon</div>
    <h1 class="poster-title">人造光</h1>
    <div class="poster-en">A R T I F I C I A L &nbsp; L I G H T</div>
    <p class="poster-log">
      柏林中心医院第6761号供体，自出生起被采血二十二年。<br/>
      他对“光”有一种异常的依恋——他相信，等有害的血被抽光，<br/>
      他就能走出去，被真正的阳光全身拥抱。
    </p>
    <div class="start-row">
      <button id="startBtn" class="start-btn">
        <span class="start-dot"></span> 完整版 · 含朗读
      </button>
      <button id="startBtnScore" class="start-btn start-btn-alt">
        <span class="start-dot"></span> 配乐版 · 无朗读
      </button>
    </div>
    <div class="poster-hint">建议全屏观看 · 戴上耳机 · 约 11 分钟 &nbsp;·&nbsp; 配乐版可自行讲述</div>
  </div>
</div>

<!-- ===================== CINEMA ===================== -->
<div id="cinema" class="cinema" aria-hidden="true">
  <div id="frame" class="frame">

    <!-- stage holds all scene layers + fx -->
    <div id="stage" class="stage">
      <div id="sceneRoot" class="scene-root"></div>   <!-- DOM scenes mounted here -->
      <canvas id="fx" class="fx-canvas"></canvas>      <!-- particles -->
      <div id="grade" class="grade"></div>             <!-- color wash / tint -->
      <div id="bloom" class="bloom"></div>             <!-- soft light bloom -->
      <div id="grain" class="grain"></div>             <!-- film grain -->
      <div id="vignette" class="vignette"></div>
      <div id="flash" class="flash"></div>             <!-- white flash / cut transitions -->
    </div>

    <!-- subtitles -->
    <div id="subs" class="subs"></div>

    <!-- PA / loudspeaker announcement banner -->
    <div id="pa" class="pa">
      <span class="pa-ico">●</span>
      <span class="pa-tag">广播</span>
      <span class="pa-text"></span>
    </div>

    <!-- HUD: act label + storyboard annotation -->
    <div id="hudTopL" class="hud-top-left">
      <span class="hud-logo">人造光</span>
      <span id="actLabel" class="hud-act"></span>
    </div>
    <div id="hudTopR" class="hud-top-right">
      <span id="shotTag" class="shot-tag"></span>
    </div>

    <!-- act title card -->
    <div id="actCard" class="act-card"></div>

    <!-- letterbox bars (drawn by frame, but kept for transition) -->
    <div class="bar bar-top"></div>
    <div class="bar bar-bottom"></div>

    <!-- ===================== CONTROLS ===================== -->
    <div id="controls" class="controls">
      <div class="timeline">
        <div id="trackFill" class="track-fill"></div>
        <div id="trackHover" class="track-hover"></div>
        <div id="trackMarks" class="track-marks"></div>
        <input id="seek" class="seek" type="range" min="0" max="682" step="0.1" value="0" />
        <div id="hoverTip" class="hover-tip"></div>
      </div>

      <div class="ctrl-row">
        <div class="ctrl-left">
          <button id="btnPlay" class="btn btn-play" title="播放 / 暂停">
            <svg viewBox="0 0 24 24" class="ic ic-play"><path d="M8 5v14l11-7z"/></svg>
            <svg viewBox="0 0 24 24" class="ic ic-pause"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
          </button>
          <button id="btnPrev" class="btn" title="上一幕"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
          <button id="btnNext" class="btn" title="下一幕"><svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg></button>
          <span id="time" class="time">0:00 / 11:22</span>
          <span id="actName" class="act-name"></span>
        </div>
        <div class="ctrl-right">
          <button id="btnSound" class="btn btn-text" title="声音">声音 关</button>
          <button id="btnSpeed" class="btn btn-text" title="速度">1×</button>
          <button id="btnBoard" class="btn btn-text" title="分镜标注">分镜</button>
          <button id="btnFull" class="btn" title="全屏"><svg viewBox="0 0 24 24"><path d="M4 9V4h5v2H6v3zm11-5h5v5h-2V6h-3zM6 15v3h3v2H4v-5zm12 3v-3h2v5h-5v-2z"/></svg></button>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="pa.js"></script>
<script src="audio.js"></script>
<script src="poster.js"></script>
<script src="intro.js"></script>
<script src="film.js"></script>
</body>
</html>
